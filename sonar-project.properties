sonar.projectKey=L02-hello-mobile_assignment-mobile
sonar.organization=L02-hello-mobile

# 1. Khai báo thư mục chứa code thật (chỉ quét trong thư mục này để tính điểm)
sonar.sources=screens

# 2. Khai báo thư mục chứa file test
sonar.tests=__tests__

# 3. Chỉ đường cho Sonar đọc file điểm Coverage của Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# 4. QUAN TRỌNG: Cấm Sonar quét rác để tránh lỗi ảo (xóa sạch 400+ bugs/code smells)
sonar.exclusions=node_modules/**, coverage/**, __tests__/**, **/*.test.tsx, **/*.test.ts, babel.config.js, jest.config.js, jest.setup.js, app.json, package.json, package-lock.json