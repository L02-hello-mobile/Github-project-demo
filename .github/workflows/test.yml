name: Test & Sonar Scan
on:
  push:
    branches:
      - main
      - w8-sonar
  pull_request:
    branches:
      - main
      - w8-sonar

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Tests with Coverage
        # Lệnh này thực hiện chạy test và xuất kết quả coverage [cite: 373]
        run: npm run test

      - name: SonarCloud Scan
        # Sử dụng action để phân tích chất lượng code trên SonarCloud [cite: 337, 391]
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}